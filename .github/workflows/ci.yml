name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  docs-and-structure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f ARCHITECTURE.md
          test -f TESTING.md
          test -f VERSIONING.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f docs/index.md
