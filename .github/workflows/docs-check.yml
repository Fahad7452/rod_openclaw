name: Docs Check

on:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "*.md"

jobs:
  markdown-presence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate key docs exist
        run: |
          test -f docs/purpose.md
          test -f docs/use-cases.md
          test -f docs/getting-started.md
          test -f docs/policy-authoring-guide.md
          test -f docs/threat-model.md
